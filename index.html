<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tính điểm xét tốt nghiệp THPT 2026</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0066cc;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:25px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:25px;
    background:#eaf8ea;
    padding:15px;
    border-radius:8px;
    font-size:20px;
    text-align:center;
    font-weight:bold;
    color:#008000;
}
</style>
</head>

<body>

<div class="container">

<h2>TÍNH ĐIỂM XÉT TỐT NGHIỆP THPT 2026</h2>

<label>Tổng điểm các môn dự thi</label>
<input type="number" id="tongDiem" step="0.01">

<label>Số môn dự thi</label>
<input type="number" id="soMon">

<label>Tổng điểm khuyến khích (nếu có)</label>
<input type="number" id="kk" step="0.01" value="0">

<label>Điểm trung bình lớp 10</label>
<input type="number" id="dtb10" step="0.01">

<label>Điểm trung bình lớp 11</label>
<input type="number" id="dtb11" step="0.01">

<label>Điểm trung bình lớp 12</label>
<input type="number" id="dtb12" step="0.01">

<label>Điểm ưu tiên (nếu có)</label>
<input type="number" id="ut" step="0.01" value="0">

<button onclick="tinh()">TÍNH ĐIỂM</button>

<div class="result" id="ketqua">
Điểm xét tốt nghiệp: --
</div>

</div>

<script>

function tinh(){

let tongDiem = parseFloat(document.getElementById("tongDiem").value) || 0;
let soMon = parseFloat(document.getElementById("soMon").value) || 1;
let kk = parseFloat(document.getElementById("kk").value) || 0;

let dtb10 = parseFloat(document.getElementById("dtb10").value) || 0;
let dtb11 = parseFloat(document.getElementById("dtb11").value) || 0;
let dtb12 = parseFloat(document.getElementById("dtb12").value) || 0;

let ut = parseFloat(document.getElementById("ut").value) || 0;

// ĐTB các năm học
let dtbNamHoc = (dtb10*1 + dtb11*2 + dtb12*3)/6;

// Điểm trung bình bài thi + KK
let diemThi = ((tongDiem/soMon) + (kk/4))/2;

// Điểm xét tốt nghiệp
let dxtn = diemThi + dtbNamHoc + ut;

document.getElementById("ketqua").innerHTML =
`
ĐTB các năm học: <b>${dtbNamHoc.toFixed(2)}</b><br><br>
Điểm xét tốt nghiệp: <span style="font-size:28px">${dxtn.toFixed(2)}</span>
`;

}

</script>

</body>
</html>
